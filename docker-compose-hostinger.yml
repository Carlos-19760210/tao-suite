services:
  evolution-api:
    image: atendai/evolution-api:v1.8.7
    container_name: evolution-api
    restart: always
    ports:
      - '8082:8080'
    environment:
      SERVER_URL: http://2.24.110.158:8082
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: TaoEvoKey2026xK9p
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'
      QRCODE_LIMIT: 30
      QRCODE_COLOR: '#198754'
      LOG_LEVEL: ERROR
      LOG_COLOR: 'false'
      DEL_INSTANCE: 'false'
      WEBHOOK_GLOBAL_ENABLED: 'false'
      CONFIG_SESSION_PHONE_CLIENT: Chrome
      CONFIG_SESSION_PHONE_NAME: Chrome
      STORE_MESSAGES: 'true'
      STORE_MESSAGE_UP: 'true'
      STORE_CONTACTS: 'true'
      STORE_CHATS: 'true'
    volumes:
      - evo_v1_store:/evolution/store
      - evo_v1_instances:/evolution/instances
    networks:
      - tao-net

  n8n:
    image: n8nio/n8n:latest
    container_name: tao-n8n
    restart: always
    ports:
      - '5678:5678'
    environment:
      N8N_HOST: '0.0.0.0'
      N8N_PORT: '5678'
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://2.24.110.158:5678
      N8N_BASIC_AUTH_ACTIVE: 'false'
      N8N_SECURE_COOKIE: 'false'
      GENERIC_TIMEZONE: America/Sao_Paulo
      TZ: America/Sao_Paulo
    volumes:
      - n8ndata:/home/node/.n8n
    networks:
      - tao-net

networks:
  tao-net:
    driver: bridge

volumes:
  evo_v1_store:
  evo_v1_instances:
  n8ndata:
